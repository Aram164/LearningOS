# External-supplements partition — migration of legacy LEARNING-RESOURCES.md
# §1 (blogs & interactive explainers) + §2 (courses & lecture series), the
# video/course/web sources not already registered by the pilot or Stage 2
# (intake of Jul 17 2026). Partitioning does not change semantics (same
# registry as sources/sources.yaml). Evaluations preserve the legacy file's
# recorded one-line judgments (Aram's curation, KW 24–29) — nothing invented.
# Curated per-domain orderings live in sources/collections/*.yaml.
sources:
  # ============================== ML — explainers & interactive (legacy §1)
  - id: source-3b1b-linear-algebra
    title: 3Blue1Brown — Essence of Linear Algebra (playlist)
