      - roles: [review, intuition]
        strengths:
          - "The standard written CNN reference; course-quality notes with exam-style parameter counting"
        useful_sections:
          - "Image Classification (k-NN + cross-validation)": "mirrors AML L02 Übungsblatt 1 Tasks 9–10"
          - "Optimization / SGD": "the 'walking downhill' framing for AML L06 gradient descent"
          - "Convolutional Networks + Understanding/Visualizing CNNs": "AML L10 + AMLS-project Task 1.4 methods (saliency, occlusion)"

