          - "Linear Models user guide": "the authoritative free Ridge/Lasso reference"
      # the mlprov doc set, migrated from legacy LEARNING-RESOURCES §4 (KW 24/29)
      - roles: [implementation]
        strengths:
          - "The complete reference set — the targeted mlprov subset below is sequenced with exercises in the sklearn crash-plan note; the full guide/gallery is the whole-library index for anything not covered"
        useful_sections:
