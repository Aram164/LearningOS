  # ==================== §8 Python OOP, scope & interpreter internals
  - id: source-hettinger-super
    title: Hettinger — Python's super() considered super!
    type: website
    authors: [Raymond Hettinger]
    year: 2011
    url: https://rhettinger.wordpress.com/2011/05/26/super-considered-super/
    evaluations:
      - roles: [first-learning, intuition]
        strengths:
          - "⭐ THE inheritance/MRO mental model (~45 min): the LoggingDict example is structurally identical to ProvDataFrame.__getitem__; MRO linearization, cooperative classes, kwargs-stripping __init__ chains, adapter classes for non-cooperative parents (the sklearn-skeleton pattern)"

  - id: source-batchelder-names
    title: Ned Batchelder — Facts and myths about Python names and values
    type: website
    authors: [Ned Batchelder]
    url: https://nedbatchelder.com/text/names.html
    identifiers:
      pycon-talk: https://nedbatchelder.com/text/names1.html
    evaluations:
      - roles: [first-learning, intuition]
        strengths:
          - "⭐ Names are references; assignment never copies; mutation vs rebinding (~40 min). The written twin of Fluent Python Ch 6 — explains why a shared provenance DataFrame bites"

  - id: source-realpython-legb
    title: Real Python — Python Scope & the LEGB Rule
    type: website
    organization: Real Python
    url: https://realpython.com/python-scope-legb-rule/
    evaluations:
      - roles: [first-learning]
        strengths:
          - "The missing scope piece: Local→Enclosing→Global→Builtin, global/nonlocal, why assignment inside a function creates a local name (the C++ intuition trap). Read §LEGB + §functions, skim the rest"

