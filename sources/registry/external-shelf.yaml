# External-shelf partition — migration of legacy LEARNING-RESOURCES.md
# §3 (books & texts) + §4 (tools, docs & repos) + §5 (papers) + §6 (solved
# practice, web tier — the local Klausur banks already have records) + §7
# (seminar) + §8 (Python OOP/scope/interpreter internals). Intake of Jul 17
# 2026. Partitioning does not change semantics (same registry as
# sources/sources.yaml). Evaluations preserve the legacy file's recorded
# judgments (Aram's curation, KW 24–29) — nothing invented.
# NOTE: the legacy §4 skrub + Stratum rows are deliberately NOT registered —
# Job/ quarantine, CLAUDE.md §13 (job knowledge stays out of the registries).
sources:
  # ==================================================== §3 books — SaD gaps
  - id: source-henze-stochastik
    title: Henze — Stochastik für Einsteiger (Springer, DE)
    type: book
    authors: [Norbert Henze]
    evaluations:
      - roles: [first-learning]
        strengths:
          - "German rigor alternative for the probability half (SaD 04–08) with exercises + Lösungen; use if Fahrmeir's probability chapters feel thin. Springer campus-license route — pull pending"

  - id: source-grinstead-snell
    title: Grinstead & Snell — Introduction to Probability (AMS, open access)
    type: book
    authors: [Charles Grinstead, J. Laurie Snell]
    url: https://www.math.dartmouth.edu/~prob/prob/prob.pdf
    evaluations:
      - roles: [first-learning]
        strengths:
          - "The gentle, computation-flavored free book — lots of worked examples + simulation; completes the softer-probability set. ❌ Download never landed (the one missing from the Jul 14 batch) — still an open pull"

  - id: source-fpp-statistics
    title: Freedman, Pisani & Purves — Statistics (Norton, 4th ed.)
    type: book
    authors: [David Freedman, Robert Pisani, Roger Purves]
    evaluations:
      - roles: [intuition]
        strengths:
          - "The classic intuition-first statistics book — box models, chance errors, tests in words before formulas. Where Fahrmeir gives the formula and Blitzstein the proof, FPP gives the picture; read a chapter when a concept computes but doesn't click. 💰 ~€60 / used cheap — buy decision pending"

  - id: source-baertl-statistik-buch
    title: Bärtl — Statistik Schritt für Schritt
    type: book
    authors: [Mathias Bärtl]
    evaluations:
      - roles: [review]
        strengths:
          - "Companion book to the Kurzes Tutorium Statistik channel — cheap (~€20) German written twin of the DE video layer, same everyday-problem style and Klausur vocabulary. 💰 buy decision pending"

  # ==================================================== §3 books — ML / DL
  - id: source-nielsen-nndl
    title: Nielsen — Neural Networks and Deep Learning (free web book)
    type: book
    authors: [Michael Nielsen]
    url: http://neuralnetworksanddeeplearning.com/
    evaluations:
      - roles: [first-learning, derivation]
        useful_sections:
          - "Ch 1–3 + 6": "phased in the DL-AMLS learning plan"
          - "Ch 2": "backprop rigor for AML L09"

  - id: source-goodfellow-dl
    title: Goodfellow, Bengio & Courville — Deep Learning (MIT Press, free web book)
    type: book
    authors: [Ian Goodfellow, Yoshua Bengio, Aaron Courville]
    year: 2016
    url: https://www.deeplearningbook.org/
    evaluations:
      - roles: [reference]
        level: advanced
        strengths:
          - "⭐ The canonical DL reference — the main gap this fills; depth reference, not a read-through"
        useful_sections:
          - "Part I (lin-alg/prob/numerical)": "backs AML L06/L09"
          - "Part II (MLPs, regularization, optimization, CNNs, RNNs)": "the theory layer under AML L08–L11 and the AMLS project"

  - id: source-bishop-prml
    title: Bishop — Pattern Recognition and Machine Learning (PRML)
    type: book
    authors: [Christopher Bishop]
    year: 2006
    url: https://www.microsoft.com/en-us/research/publication/pattern-recognition-machine-learning/
    identifiers:
      exercise-solutions: https://www.microsoft.com/en-us/research/wp-content/uploads/2016/05/prml-web-sol-2009-09-08.pdf
    evaluations:
      - roles: [reference]
        level: advanced
        strengths:
          - "Listed so nobody buys it by accident: this classic has a legal free PDF (Microsoft). Murphy & ESL cover the same ground in the current stack"
          - "Degree-planning anchor (KW 25 axis files): 'the most Bishop-shaped catalog' — Ch 8 PGM + 7 SVM + 14 ensembles carry ML 2-X; Ch 3–5/6.4/9/12 carry MI I + ML 1-X gaps; Ch 9/12/13 (EM, PCA, HMM) nearly cover MI II; official exercise solutions free"

