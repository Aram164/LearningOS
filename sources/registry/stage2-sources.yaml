      - concepts: [concept-parameter-servers]
        roles: [first-learning]
        useful_sections:
          - "06 — Parameter Servers": "V2 Collective Communication + USP ZeRO as the book layer"
      - concepts: [concept-llm-systems]
        roles: [first-learning]
        useful_sections:
