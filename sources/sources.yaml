# Source registry — evaluated teaching objects. Contextual evaluations here are
# the CANONICAL home of pedagogical judgments (crosswalk notes narrate, never own).
# Pilot scope: sources needed by the migrated pilot set (Master Wiring, SaD
# crosswalk, AML L07 unit, SaD L02 unit, Regression Bridge). Full registry: Stage 2.
# material:// URIs point at LearningOS/materials/<source-id>/ — materials move in
# Stage 2 (Step 8); unresolved URIs are reported as warnings by design until then.
sources:
  # ================================================== lecture-series sources
  - id: source-aml-ss26-lectures
    title: AML — Angewandtes Maschinelles Lernen, lecture slides (SoSe 2026)
    type: lecture
    authors: [Patrick Schäfer]
    organization: HU Berlin
    year: 2026
    material: material://source-aml-ss26-lectures/lecture-slides
    evaluations:
      - concepts: [concept-k-nearest-neighbors, concept-bias-variance-tradeoff,
                   concept-cross-validation, concept-classification-metrics]
        roles: [first-learning]
        useful_sections:
          - "L02 — k-NN, bias-variance, CV, generalization": "SaD 13 gives the algorithm + metrics, AML gives the theory (strong wire)"
      - concepts: [concept-linear-regression, concept-mean-squared-error]
        roles: [first-learning]
        useful_sections:
          - "L03 — Linear regression": "MSE, derivative=0; the strongest cross-module wire of the semester (same minimization as SaD 03, scalar vs matrix)"
      - concepts: [concept-normal-equation, concept-regularization]
        roles: [first-learning]
        useful_sections:
          - "L04 — Design matrix, normal equation, Ridge/Lasso": "SaD 03's k=(AᵀA)⁻¹Aᵀy IS this lecture's w=(XᵀX)⁻¹Xᵀy"
      - concepts: [concept-logistic-regression, concept-sigmoid, concept-decision-boundary,
                   concept-cross-entropy, concept-maximum-likelihood]
        roles: [first-learning, derivation]
        strengths:
          - "Full MLE → cross-entropy derivation on slides 40–62: product → log → sum → ×(−1/m); combined/vectorized loss; gradient dL/dw = (1/m)Xᵀ(σ(Xw)−y); no-closed-form result"
          - "The 3-step construction (sl. 5–9): linear regression + threshold fails → separator w·x=0 → squash with σ; boundary geometry + basis expansion (fit a circle, sl. 33–34)"
          - "Heavier than most plans assume — the derivation is the semester's deepest cross-wire (MLE engine, Bernoulli output)"
        useful_sections:
          - "L05 — Logistic regression (sl. 5–35 construction, 39–62 loss)": "sigmoid, decision boundary, MLE→cross-entropy full derivation; MSE forbidden (non-convex for σ)"
      - concepts: [concept-gradient-descent, concept-adam-optimizer, concept-convexity,
                   concept-feature-scaling]
        roles: [first-learning, derivation]
        strengths:
          - "Goes far past plain SGD: momentum, RMSProp, Adam, Newton/Hessian, convexity via PSD Hessian, feature scaling — Adam double-pays for the AMLS project"
        useful_sections:
          - "L06 — GD, SGD, mini-batch, Adam, Newton, convexity": "sl. 19 shows linear and logistic gradients in one frame; sl. 35–45 feature scaling"
      - concepts: [concept-perceptron, concept-kernel-trick, concept-xor-problem]
        roles: [first-learning, derivation]
        strengths:
          - "Perceptron primal AND dual form, convergence, XOR non-separability, kernel trick with 2d worked example, RBF kernel, One-vs-Rest + multiclass perceptron"
        weaknesses:
          - "Contains NO SVM — no maximum margin, no support vectors (slide-verified Jun 10, 2026). External 'kernel' problem sets are dominated by SVM: take only the kernel-computation parts"
        useful_sections:
          - "L07 — Linear classifiers, perceptron, kernel trick, multi-class (94 slides)": "the hinge between classic ML (L02–L06) and the NN arc (L08–L10)"
      - concepts: [concept-neural-network, concept-softmax, concept-classification-metrics,
                   concept-xor-problem]
        roles: [first-learning]
        strengths:
          - "Forward-pass worked example shares its numbers with L09's backprop example (W⁽¹⁾=[[1,2],[1,2]], x=[1,0] → ŷ=0.94) — do it by hand once, reuse"
          - "Metrics block (accuracy/precision/recall/F1 + micro/macro/weighted) is a literal repeat of SaD 11 — plus the multi-class averaging that is new and exam-relevant"
        useful_sections:
          - "L08 — MLP, forward pass, XOR solved, activations, softmax, metrics": "2 linear layers collapse to 1 (proven sl. 41); output layers by task (sl. 43–51); metrics sl. 60–80"
      - concepts: [concept-backpropagation, concept-chain-rule, concept-weight-decay,
                   concept-dropout, concept-early-stopping]
        roles: [first-learning, derivation]
        strengths:
          - "OWNS NN regularization: L2/Frobenius weight decay, dropout, early stopping, double descent — these live HERE, not in L04 (slide-verified correction)"
          - "Computation graphs + the four per-layer backprop rules + full worked example (same numbers as L08), closing with the identical example in PyTorch"
        weaknesses:
          - "No batch normalization — out of scope for this course's exam (slide-verified)"
        useful_sections:
          - "L09 — Backprop, computation graphs, regularization, double descent": "vanishing/exploding gradients (λ⁷ argument, sl. 71–74)"

  - id: source-sad-ss26-lectures
    title: SaD — Statistik und Datenanalyse, lecture slides (SoSe 2026)
    type: lecture
    authors: [Ulf Leser, Alan Akbik]
    organization: HU Berlin
    year: 2026
    material: material://source-sad-ss26-lectures/lecture-slides
    evaluations:
      - concepts: [concept-descriptive-statistics, concept-classification-metrics]
        roles: [first-learning]
        useful_sections:
          - "L01–L02 — Introduction, basic concepts": "mean/median/mode, histograms, TP/FP/FN/TN via contingency tables (L01); population/sample, scale types, x̄, s², quantiles, boxplots, Simpson (L02)"
      - concepts: [concept-linear-regression, concept-normal-equation, concept-gradient-descent]
        roles: [first-learning]
        strengths:
          - "The normal equation appears HERE first (k=(AᵀA)⁻¹Aᵀy, sl. 17–37) — AML L04 renames it; GD introduced as an 'alternative' (sl. 29–37) before AML L06 makes it everything"
        useful_sections:
          - "L03 — Correlation & regression": "covariance, Pearson r, k = r·s_y/s_x, MLR, GD intro"
      - concepts: [concept-probability, concept-conditional-probability, concept-bayes-theorem,
                   concept-naive-bayes]
        roles: [first-learning]
        weaknesses:
          - "Slide 47 Bayes example misprint: the correct answer is 0.91, not 0.99 (verified during the L04 unit build, KW 28)"
        useful_sections:
          - "L04 — Probability, Bayes, Naive Bayes": "axioms, conditional P, Bayes' theorem, independence, NB spam example (~sl. 40+)"
      - concepts: [concept-combinatorics]
        roles: [first-learning]
        useful_sections:
          - "L05 — Combinatorics": "permutations, variations, combinations — 6 cases + hypergeometric"
      - concepts: [concept-random-variable, concept-expected-value, concept-variance]
        roles: [first-learning]
        useful_sections:
          - "L06 — Random variables": "RV, CDF/PDF, E[X], Var, rules, Tschebyscheff, IID, LLN"
      - concepts: [concept-discrete-distributions]
        roles: [first-learning]
        useful_sections:
          - "L07 — Discrete distributions": "Binomial, hypergeometric, Poisson"
      - concepts: [concept-normal-distribution, concept-central-limit-theorem,
                   concept-maximum-likelihood, concept-feature-scaling]
        roles: [first-learning, derivation]
        strengths:
          - "The MLE→MSE derivation (sl. 29–36) — Gaussian noise + MLE ⟹ MSE; the engine AML L05 re-runs with Bernoulli for cross-entropy; a mock-exam staple"
        useful_sections:
          - "L08 — Normal distribution, CLT, MLE→MSE": "N(μ,σ²), z-scores/z-normalization, CLT"
      - concepts: [concept-statistical-estimation]
        roles: [first-learning]
        useful_sections:
          - "L09 — Estimation": "unbiased/consistent/efficient point estimators, CIs, t-distribution"
      - concepts: [concept-hypothesis-testing]
        roles: [first-learning]
        useful_sections:
          - "L10 — Testing": "H₀/H₁, p-values, Type I/II, z/t-tests, non-parametric"
      - concepts: [concept-bias-variance-tradeoff, concept-bootstrap, concept-classification-metrics]
        roles: [first-learning, review]
        useful_sections:
          - "L11 — Data science intro (126 slides)": "losses, train/test, eval metrics (sl. 23–38), pipelines, inductive bias, bias-variance, bootstrapping"
      - concepts: [concept-entropy, concept-information-gain, concept-decision-trees,
                   concept-random-forest, concept-bootstrap]
        roles: [first-learning]
        strengths:
          - "Includes regression trees (variance as split criterion), stacking and boosting beyond ID3/RF — UE7-relevant, easy to miss"
        useful_sections:
          - "L12 — Tree-based learning": "entropy → information gain → ID3 → pruning → bagging/boosting/stacking → Random Forests"
      - concepts: [concept-k-nearest-neighbors, concept-feature-scaling]
        roles: [first-learning]
        strengths:
          - "Includes indexing structures (kd-trees, LSH) and the metric axioms (symmetry, non-negativity, identity, triangle inequality) — Leser-flavored, plausibly exam-relevant"
        useful_sections:
          - "L13 — Similarity-based learning": "k-NN, distance measures, Voronoi, scaling, indexing"
      - concepts: [concept-naive-bayes, concept-laplace-smoothing, concept-gaussian-naive-bayes]
        roles: [first-learning, derivation]
        useful_sections:
          - "L14 — Probability-based learning": "Laplace smoothing (sl. 8–10), Gaussian NB (sl. 14–18), multinomial NB + log-space trick (sl. 19–23), Bayes-net outlook"
      - concepts: [concept-neural-network, concept-perceptron, concept-softmax,
                   concept-backpropagation]
        roles: [first-learning]
        strengths:
          - "The 'Remember MLR?' / drop-φ slide — per the Master Wiring the most important slide in SaD: a 1-layer ANN with identity activation IS multivariate linear regression"
          - "Softmax introduced as the differentiable argmax — the NB decision rule living on inside every classifier net"
          - "Parameter-counting formula n·l + (k−1)·l² + l·m — a SaD exam target"
        useful_sections:
          - "L15 — Neural networks": "perceptron as 1-neuron ANN (sl. 1–12), MLP, backprop overview (read BEFORE AML L09's full machinery)"

  - id: source-sad-2025-recordings
    title: SaD 2025 lecture recordings (WiSe 2025 run)
    type: video
    organization: HU Berlin
    year: 2025
    material: material://source-sad-2025-recordings
    evaluations:
      - roles: [review, first-learning]
        strengths:
          - "Same course, one year older — always the FIRST video pick when 2026 slides alone don't click; recordings exist for lectures 01–13"
        weaknesses:
          - "Numbering differs from 2026 (stats core 04–10 nearly identical; ML lectures reorganized)"
      - concepts: [concept-expected-value, concept-random-variable]
        roles: [first-learning]
        strengths:
          - "2025 splits E[X] over two lectures (L05+L06) — more depth than 2026's single L06"
      - concepts: [concept-neural-network, concept-backpropagation]
        roles: [first-learning]
        strengths:
          - "2025 L14+L15: two full NN lectures vs one in 2026 — the best local depth for SaD 15, significantly more on backprop"

  # ============================================================== books (ML)
  - id: source-islp
    title: "An Introduction to Statistical Learning (Python edition)"
    type: book
    authors: [Gareth James, Daniela Witten, Trevor Hastie, Robert Tibshirani, Jonathan Taylor]
    year: 2023
    material: material://source-islp/islp.pdf
    evaluations:
      - roles: [first-learning, review]
        level: introductory
        strengths: ["The AML spine — read first; matches the lecture framing"]
        weaknesses: ["No standalone gradient-descent treatment (only §10.7, deep learning)"]
      - concepts: [concept-logistic-regression, concept-sigmoid]
        roles: [first-learning, review]
        level: introductory
        strengths:
          - "§4.3 (p.138): the model, odds/logit, MLE coefficient estimation — the core L05 read; log-odds view: logistic regression is linear regression on the log-odds"
        useful_sections:
          - "§4.3.1 The Logistic Model (p.139), §4.3.4 Multiple LR (p.142)": "in-scope for AML L05"
      - concepts: [concept-linear-regression, concept-regularization]
        roles: [first-learning, review]
        level: introductory
        useful_sections:
          - "Ch 3 + §6.2": "regression with inference (SE, CI, t-tests on β̂ — the SaD 09/10 layer) + shrinkage geometry"
      - concepts: [concept-decision-trees, concept-random-forest]
        roles: [first-learning, review]
        useful_sections:
          - "§8.1 (p.331), §8.2 (p.343)": "trees; bagging/RF/boosting — page-verified against the local PDF"
      - concepts: [concept-naive-bayes]
        roles: [review]
        useful_sections:
          - "§4.4.4 NB (p.158), lab §4.7.5 (p.182)": "optional depth for SaD 14"
      - concepts: [concept-kernel-trick]
        roles: [review]
        level: intermediate
        weaknesses:
          - "Ch 9 reaches kernels only through the SVM, which AML L07 does NOT teach — optional enrichment only; §9.3.2 is the closest section"
      - concepts: [concept-neural-network, concept-backpropagation]
        roles: [first-learning]
        useful_sections:
          - "§10.1–10.2, §10.7": "single/multi-layer networks; the only ISLP GD appearance"

      - concepts: [concept-k-nearest-neighbors, concept-bias-variance-tradeoff,
                   concept-cross-validation]
        roles: [first-learning]
        level: introductory
        useful_sections:
          - "§2.2.2–2.2.3, §3.5, §5.1 (incl. §5.1.4)": "the gentle entry: U-shaped test error, k-NN vs linear regression (the L02↔L03 link), the CV machinery for choosing k"
      - concepts: [concept-neural-network, concept-backpropagation, concept-weight-decay,
                   concept-dropout, concept-early-stopping]
        roles: [first-learning, review]
        strengths:
          - "§10.8 is one of only TWO book treatments of double descent (with the interpolation-threshold picture) — direct match to AML L09"
        useful_sections:
          - "§10.1–10.2, §10.7–10.8": "forward pass with explicit parameter counting (an AML+SaD exam target); backprop, regularization+SGD, dropout; double descent"
      - concepts: [concept-convolutional-networks]
        roles: [first-learning]
        strengths:
          - "§10.3.4 Data Augmentation is the theory behind AMLS Project Task 1.3 — one stone, two exams"
        useful_sections:
          - "§10.3 (p.406): §10.3.1 conv layers, §10.3.2 pooling, §10.3.3 architecture, §10.3.4 augmentation": "the gentle full CNN match"
      - concepts: [concept-recurrent-networks]
        roles: [first-learning]
        useful_sections:
          - "§10.5 (p.416)": "gentle RNN pass; LSTM only mentioned"
      - concepts: [concept-basis-functions]
        roles: [first-learning]
        useful_sections:
          - "§7.1 Polynomial Regression (p.290), §6.2.1–6.2.2 Ridge/Lasso": "basis expansion THIS SECTION ONLY (no splines/subset selection — beyond AML L04); the diamond-vs-circle geometry"

  - id: source-esl
    title: The Elements of Statistical Learning
    type: book
    authors: [Trevor Hastie, Robert Tibshirani, Jerome Friedman]
    year: 2009
    material: material://source-esl/esl.pdf
    evaluations:
      - roles: [review, derivation]
        level: advanced
        strengths: ["The proof + depth layer; same authors as ISLP"]
        weaknesses: ["Graduate-level throughout; no GD chapter (fits via Newton/IRLS)"]
      - concepts: [concept-logistic-regression]
        roles: [derivation]
        level: advanced
        weaknesses:
          - "§4.4 fits via Newton–Raphson/IRLS, NOT the gradient descent AML L06 uses"
        useful_sections:
          - "§4.4 (p.119), §4.4.1 (p.120), §4.4.4 L1-regularized (p.125)": "MLE/log-likelihood fit; LR-vs-LDA contrast in §4.4.5"
      - concepts: [concept-perceptron]
        roles: [derivation, review]
        level: advanced
        strengths:
          - "§4.5.1 Rosenblatt perceptron WITH the convergence result — one of only two book homes of the actual algorithm"
      - concepts: [concept-k-nearest-neighbors, concept-linear-regression]
        roles: [review]
        strengths:
          - "§2.3.3 'From Least Squares to Nearest Neighbors' — a hidden gem: frames the two as ends of one flexibility spectrum (best single tie between AML L02 and L03)"

      - concepts: [concept-k-nearest-neighbors, concept-bias-variance-tradeoff]
        roles: [derivation, review]
        level: advanced
        strengths:
          - "§2.9 derives the k-NN variance term σ²/k; §7.2–7.3 is the rigorous MSE = Bias² + Var + σ² decomposition, done explicitly for k-NN AND linear regression — the deep dive"
        useful_sections:
          - "§2.3.2–2.3.3, §2.9, §7.2–7.3 (+§7.3.1 worked example), §13.3, §7.10": "nearest neighbors, the LS↔NN flexibility spectrum, the decomposition, applied k-NN, rigorous CV"
      - concepts: [concept-regularization]
        roles: [derivation]
        level: advanced
        useful_sections:
          - "§3.4.1–3.4.3": "the rigorous Ridge/Lasso treatment (SVD view of ridge, why lasso gives sparsity) — best depth source for AML L04"
      - concepts: [concept-convolutional-networks]
        roles: [review]
        strengths:
          - "§11.7 historical gem: LeCun's 1989 ZIP-code nets — weight sharing invented before your eyes, the ancestor of LeNet-5; 20 fun minutes, zero exam obligation"
        weaknesses:
          - "No modern CNN treatment"

  - id: source-murphy-pml1
    title: "Probabilistic Machine Learning: An Introduction"
    type: book
    authors: [Kevin P. Murphy]
    year: 2022
    material: material://source-murphy-pml1/pml1.pdf
    evaluations:
      - roles: [review, derivation]
        level: advanced
        strengths: ["The only local AML book that does gradient descent properly (Ch 8)"]
      - concepts: [concept-logistic-regression, concept-cross-entropy, concept-maximum-likelihood,
                   concept-gradient-descent]
        roles: [derivation, review]
        level: advanced
        strengths:
          - "Ch 10 (§10.2.3 MLE, §10.2.4 SGD): the cleanest 'cross-entropy from MLE → gradient → SGD' arc in print — maps to AML L05 AND L06 together"
        useful_sections:
          - "Ch 10 (p.339)": "logistic regression end-to-end"
      - concepts: [concept-gradient-descent, concept-convexity]
        roles: [derivation, review]
        level: advanced
        useful_sections:
          - "Ch 8 (p.275), §8.4 SGD (p.292)": "local/global optima, convexity, smoothness, step size — the on-scope book reference for AML L06"
      - concepts: [concept-perceptron]
        roles: [review]
        strengths:
          - "§10.2.5: the perceptron as 'logistic regression with a hard threshold' — the cleanest link back to L05"

      - concepts: [concept-k-nearest-neighbors, concept-curse-of-dimensionality]
        roles: [review]
        useful_sections:
          - "§16.1 (p.547), §4.7.6 (p.159)": "k-NN under exemplar-based methods incl. curse of dimensionality; the bias-variance decomposition with the ridge '100 datasets' figure + the caveat that it does not decompose for 0-1 loss"
      - concepts: [concept-neural-network, concept-xor-problem]
        roles: [first-learning, review]
        useful_sections:
          - "§13.2 MLPs (p.426): §13.2.1 XOR, §13.2.3 activations": "tells the lecture's XOR-solved-by-stacking story; the definitive activation-function reference (saturation, why ReLU)"
      - concepts: [concept-backpropagation, concept-weight-decay, concept-dropout,
                   concept-early-stopping]
        roles: [derivation, review]
        level: advanced
        strengths:
          - "The ONLY book that teaches backprop the way AML L09 does — as reverse-mode autodiff on a computation graph (§13.3.4); §13.5 covers all three of the lecture's regularizers under one roof"
        useful_sections:
          - "§13.3 (p.438), §13.4.2 vanishing/exploding, §13.5 regularization": "beyond-deck: §13.4.3–13.4.4 fixes, §13.3.3 vector-Jacobian products"
      - concepts: [concept-convolutional-networks]
        roles: [derivation, review]
        level: advanced
        strengths:
          - "§14.3.1–14.3.4 is the lecture's famous-architecture list ONE-TO-ONE: LeNet, AlexNet, GoogLeNet, ResNet; §14.2.1 has the full convolution arithmetic incl. the (n+2p−f)/s+1 formula"
        weaknesses:
          - "§14.2.4 batch norm is NOT in the 2026 deck (optional depth); §14.4+ (detection/segmentation) is beyond scope"
        useful_sections:
          - "§14.1–14.3 (p.467–479)": "the deep CNN source; opens with the lecture's exact motivation"
      - concepts: [concept-recurrent-networks]
        roles: [derivation]
        strengths:
          - "§15.2.7 (p.512) is the only local source that does the GRU + LSTM gate equations"
        useful_sections:
          - "§15.2 RNNs (p.503)": "for the L11 deck once posted"

  - id: source-cs229-notes
    title: CS229 Lecture Notes (Stanford)
    type: documentation
    authors: [Andrew Ng, Tengyu Ma]
    material: material://source-cs229-notes/cs229-notes.pdf
    evaluations:
      - roles: [derivation, review]
        level: intermediate
        strengths:
          - "Concise, derivation-first; the written companion to the CS229 video spine — the single best bridge across AML L03→L09 in one short document (216 pp)"
        weaknesses: ["No k-NN, no CNN"]
      - concepts: [concept-gradient-descent]
        roles: [derivation, first-learning]
        strengths:
          - "§1.1 LMS (p.9): batch GD + SGD derived from scratch in the lectures' own notation — the best-aligned written GD source for AML L06"
      - concepts: [concept-logistic-regression, concept-sigmoid]
        roles: [derivation]
        useful_sections:
          - "§2.1 (p.20), §2.3 Newton (p.24), §3.2.2 GLM (p.30)": "log-likelihood gradient (y−h)·x; the GLM derivation of WHY the sigmoid"
      - concepts: [concept-kernel-trick, concept-perceptron]
        roles: [derivation, first-learning]
        strengths:
          - "Ch 5 + §2.2: the ONLY book source that develops feature maps → kernel trick → kernel properties WITHOUT the SVM — exactly AML L07's route"
      - concepts: [concept-naive-bayes, concept-laplace-smoothing, concept-gaussian-naive-bayes]
        roles: [derivation, review]
        useful_sections:
          - "§4.1–4.2 GDA/NB (p.42), §4.2.1 Laplace (p.45), §4.2.2 event models": "the exact SaD-14 menu, including multinomial NB"

      - concepts: [concept-linear-regression, concept-mean-squared-error, concept-normal-equation]
        roles: [derivation, first-learning]
        useful_sections:
          - "§1.1 LMS (p.9), §1.2 normal equations (p.13), §1.3 probabilistic interpretation (p.15)": "GD derived, the normal equation via matrix calculus, and WHY squared error = MLE under Gaussian noise — same notation as the lecture videos"
      - concepts: [concept-basis-functions, concept-regularization, concept-weight-decay]
        roles: [derivation]
        strengths:
          - "§9.1 is the cleanest regularizer treatment for AML L04: Jλ = J + λR(θ); the θ ← (1−λη)θ − η∇J derivation IS the L09 weight-decay update; L1 = lasso/sparsity"
        useful_sections:
          - "§5.1–5.2 (p.49), §9.1 (p.125)": "basis expansion as feature maps φ(x)"
      - concepts: [concept-neural-network, concept-backpropagation]
        roles: [derivation]
        strengths:
          - "§7.3 is the closest WRITTEN derivation to the lecture's four per-layer backprop rules (one neuron → two-layer → vectorized); §8.2 is the other double-descent source (model-wise + sample-wise)"
        useful_sections:
          - "§7.1–7.2, §7.4 (vectorization over examples), §7.3, §8.2 (p.111)": "builds 1 neuron → multi-layer ReLU-first, exactly like AML L08"
      - concepts: [concept-bias-variance-tradeoff, concept-cross-validation]
        roles: [derivation, review]
        strengths:
          - "Bias defined as 'test error even with infinite training data'; the Bias²+Var+σ² decomposition (§8.1.1)"
        weaknesses:
          - "No k-NN anywhere in the notes"
        useful_sections:
          - "§8.1 (p.105), §9.3 (p.129)": "decomposition; model selection via CV"

  - id: source-mml
    title: Mathematics for Machine Learning
    type: book
    authors: [Marc Peter Deisenroth, A. Aldo Faisal, Cheng Soon Ong]
    year: 2020
    url: https://mml-book.github.io/
    evaluations:
      - concepts: [concept-gradient-descent, concept-convexity]
        roles: [derivation]
        level: advanced
        strengths:
          - "Ch 7 Continuous Optimization: the rigorous MATH of GD — descent direction, step size/momentum, convexity, why it converges"
        weaknesses:
          - "No k-NN and no logistic regression (classification via SVM, Ch 12) — do not go here for AML L02/L05"

      - concepts: [concept-linear-regression, concept-normal-equation, concept-maximum-likelihood]
        roles: [derivation]
