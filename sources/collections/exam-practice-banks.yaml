# Migrated from legacy LEARNING-RESOURCES.md §6 (KW 24–29 curation).
title: Exam-practice banks — solved material per module
description: >-
  No HU-internal Altklausuren are public for any module — this bank is solved
  material matched to each course's blocks. The real Altklausur channels
  (Moodle Probeklausuren, Fachschaft Gedächtnisprotokolle, last-year students)
  are workspace action items, not sources. AMLS caveat: if the exam is oral,
  drill explain-aloud (AL.X-style), not Altklausur hunting.
